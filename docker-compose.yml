services:
  mysql:

    image: mysql:8.0
    container_name: kysMarket_mysql

    environment:
      MYSQL_DATABASE: kysmarket
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: kysmarket_user
      MYSQL_PASSWORD: SKY

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kysmarket_network

  
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    
    container_name: kysMarket_app
    working_dir: /var/www

    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - kysmarket_network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name:  kysMarket_node
    working_dir: /workspace

    volumes:
      - ./backend:/workspace/backend
      - ./frontend:/workspace/frontend

    networks:
      - kysmarket_network
     
  nginx:
    image: nginx:latest
    container_name: kysMarket_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kysmarket_network


  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kysMarket_phpmyadmin
    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      - mysql
    networks:
      - kysmarket_network
      
volumes:
  mysql_data:

networks:
  kysmarket_network:
    name: kysmarket_network
    driver: bridge

    